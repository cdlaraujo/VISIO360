<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visio360</title>
    <script src="Cesium/Cesium.js"></script>
    <script src="libs/peerjs.min.js"></script>
    <script type="importmap">
    {
      "imports": {
        "peerjs": "./libs/peerjs-shim.js"
      }
    }
    </script>
    <link rel="stylesheet" href="Cesium/Widgets/widgets.css" />
    <link rel="stylesheet" href="src/style.css" />
    <style>
        .cesium-widget-credits { display: none !important; }
    </style>
</head>
<body>
    <div class="cad-layout">
        <header class="command-bar">
            <div class="logo-section">
                <img src="public/nd-logo.avif" alt="Company Logo" class="company-logo">
                <span class="app-title">Visio360</span>
            </div>
            <div class="user-section">
                <input type="text" id="user-name-input" class="user-name-field" placeholder="Seu nome" value="Usuário">
            </div>
        </header>

        <div class="tool-ribbon">
            <div class="ribbon-section">
                <label class="ribbon-label">Medição</label>
                <div class="ribbon-tools">
                    <button class="ribbon-btn" id="measure-tool-btn" title="Medir Distância (Ctrl+D)">
                        <span class="icon">📏</span>
                        <span class="label">Distância</span>
                    </button>
                    <button class="ribbon-btn" id="angle-tool-btn" title="Medir Ângulo">
                        <span class="icon">∡</span>
                        <span class="label">Ângulo</span>
                    </button>
                    <button class="ribbon-btn" id="area-tool-btn" title="Calcular Área Plana (Ctrl+A)">
                        <span class="icon">📐</span>
                        <span class="label">Área</span>
                    </button>
                    <button class="ribbon-btn" id="surface-area-tool-btn" title="Calcular Área de Superfície (Ctrl+S)">
                        <span class="icon">🗻</span>
                        <span class="label">Superfície</span>
                    </button>
                    <button class="ribbon-btn" id="volume-tool-btn" title="Calcular Volume (Corte/Aterro)">
                        <span class="icon">🧊</span>
                        <span class="label">Volume</span>
                    </button>
                    <button class="ribbon-btn" id="volume-box-tool-btn" title="Calcular Volume da Caixa">
                        <span class="icon">📦</span>
                        <span class="label">Caixa</span>
                    </button>
                </div>
            </div>
            <div class="ribbon-divider"></div>
            <div class="ribbon-section">
                <label class="ribbon-label">Modelo</label>
                <div class="ribbon-tools">
                    <button class="ribbon-btn" id="model-config-btn" title="Gerenciar Modelo (Ctrl+O)">
                        <span class="icon">📦</span>
                        <span class="label">Carregar</span>
                    </button>
                </div>
            </div>
            <div class="ribbon-divider"></div>
            <div class="ribbon-section">
                <label class="ribbon-label">Colaboração</label>
                <div class="ribbon-tools">
                    <button class="ribbon-btn" id="create-room-btn" title="Criar Nova Sala">
                        <span class="icon">🚀</span>
                        <span class="label">Nova Sala</span>
                    </button>
                    <button class="ribbon-btn" id="join-room-btn" title="Entrar em Sala Existente">
                        <span class="icon">🔗</span>
                        <span class="label">Entrar</span>
                    </button>
                </div>
            </div>
            <div class="ribbon-divider"></div>
            <div class="ribbon-section">
                <label class="ribbon-label">Limpeza</label>
                <div class="ribbon-tools">
                    <button class="ribbon-btn clear-btn" id="clear-all-btn" title="Limpar Todas as Medições (Ctrl+Del)">
                        <span class="icon">🗑️</span>
                        <span class="label">Limpar</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="cesiumContainer"></div>

        <aside class="left-panel">
            <div class="panel-header">
                <h3>PROPRIEDADES</h3>
            </div>
            <div class="panel-content">
                <div id="model-info-section" class="property-group">
                    <h4>Modelo</h4>
                    <div class="property-item">
                        <label>Nome:</label>
                        <span id="model-name-display">Nenhum carregado</span>
                    </div>
                    <div class="property-item">
                        <label>Formato:</label>
                        <span id="model-format-display">-</span>
                    </div>
                    <div class="property-item">
                        <label>Vértices:</label>
                        <span id="model-vertices-display">-</span>
                    </div>
                </div>

                <div id="collaboration-section" class="property-group">
                    <h4>Colaboração</h4>
                    <div id="room-connect-controls" style="display: block;">
                        <button id="create-room-btn-panel" class="btn btn-success" style="width: 100%; margin-bottom: 8px;">🚀 Criar Sala</button>
                        <button id="join-room-btn-panel" class="btn btn-secondary" style="width: 100%;">🔗 Entrar em Sala</button>
                        <div id="join-room-input" style="display: none; margin-top: 12px;">
                            <input type="text" id="room-id-input" class="input-field" placeholder="Código da sala ou URL">
                            <button id="join-room-confirm-btn" class="btn btn-primary" style="width: 100%; margin-top: 8px;">Conectar</button>
                            <button id="join-room-cancel-btn" class="btn btn-secondary" style="width: 100%; margin-top: 4px;">Cancelar</button>
                        </div>
                    </div>
                    <div id="room-status" style="display: none;">
                        <div class="property-item">
                            <label>Status:</label>
                            <span id="connection-status" class="status-badge">Desconectado</span>
                        </div>
                        <div class="property-item">
                            <label>Sala:</label>
                            <span id="room-code-display" style="font-family: monospace; font-size: 0.85em; cursor: pointer;" title="Clique para copiar">-</span>
                        </div>
                        <div class="property-item">
                            <label>Participantes:</label>
                            <span id="peer-count">1</span>
                        </div>
                        <button id="disconnect-room-btn" class="btn btn-secondary" style="width: 100%; margin-top: 12px;">Desconectar</button>
                    </div>
                    <div id="peers-container" style="margin-top: 12px; display: none;"></div>
                </div>
            </div>
        </aside>

        <aside class="right-panel">
            <div class="panel-header">
                <h3>MEDIÇÕES</h3>
            </div>
            <div class="panel-content">
                <div id="measurements-panel" class="measurements-panel">
                    <div id="measurements-container"></div>
                </div>
            </div>
        </aside>

        <footer class="status-bar">
            <div class="status-item">
                <span id="tool-instructions">Pronto</span>
            </div>
            <div class="status-item">
                <span id="coordinates">Lon: - | Lat: - | Alt: -</span>
            </div>
            <div class="status-item">
                <span id="fps-counter">FPS: -</span>
            </div>
        </footer>
    </div>

    <div id="model-loading-section" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Carregar Modelo 3D</h3>
                <button class="modal-close" id="close-model-modal">×</button>
            </div>
            <div class="modal-body">
                <div id="model-input-area">
                    <div class="input-group">
                        <label>URL do Modelo / 3D Tiles</label>
                        <input type="text" id="model-url-input" class="input-field" placeholder="https://exemplo.com/tileset.json ou modelo.glb">
                        <button id="load-model-url-btn" class="btn btn-primary">Carregar via URL</button>
                    </div>
                    <div class="divider"><span>ou</span></div>
                    <div class="input-group">
                        <label for="model-input" class="custom-file-upload">
                            <span class="icon">📁</span>
                            <span>Carregar do Computador</span>
                            <span class="file-hint">.glb, .gltf, .czml</span>
                        </label>
                        <input type="file" id="model-input" accept=".glb,.gltf,.czml" />
                    </div>
                </div>
                <div id="model-info-area" style="display:none;">
                    <p style="margin: 0 0 16px 0;">Modelo atual: <b id="current-model-name"></b></p>
                    <button id="change-model-btn" class="btn btn-secondary">Trocar Modelo</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
